name: Build PushAlarm IPA

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger it manually from the GitHub website

jobs:
  build:
    runs-on: macos-14   # free macOS runner with Xcode 16

    steps:
      # ── 1. Check out your code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode 16 ──────────────────────────────────────────────
      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.1.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.0.app 2>/dev/null || \
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      # ── 3. Resolve package dependencies (if any future SPM packages added) ──
      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project PushAlarm.xcodeproj \
            -scheme PushAlarm 2>/dev/null || true

      # ── 4. Build archive (no signing — Sideloadly signs it on Windows) ──
      - name: Build Archive (unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project PushAlarm.xcodeproj \
            -scheme PushAlarm \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/PushAlarm.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            | xcpretty --color || true
          # Fallback: run again without xcpretty if it failed
          if [ ! -d "$RUNNER_TEMP/PushAlarm.xcarchive" ]; then
            xcodebuild archive \
              -project PushAlarm.xcodeproj \
              -scheme PushAlarm \
              -configuration Release \
              -archivePath "$RUNNER_TEMP/PushAlarm.xcarchive" \
              -destination "generic/platform=iOS" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              AD_HOC_CODE_SIGNING_ALLOWED=YES \
              DEVELOPMENT_TEAM=""
          fi

      # ── 5. Package .app → .ipa ──────────────────────────────────────────
      # Apple's IPA format is just a zip: Payload/<AppName>.app
      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/PushAlarm.xcarchive/Products" -name "*.app" | head -1)
          echo "Found app: $APP_PATH"

          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -r "$APP_PATH" "$PAYLOAD_DIR/"

          cd "$RUNNER_TEMP"
          zip -qr PushAlarm.ipa Payload
          echo "IPA created at: $RUNNER_TEMP/PushAlarm.ipa"
          ls -lh PushAlarm.ipa

      # ── 6. Upload IPA as a downloadable artifact (30-day retention) ─────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PushAlarm-IPA
          path: ${{ runner.temp }}/PushAlarm.ipa
          retention-days: 30

      # ── 7. Show build summary ───────────────────────────────────────────
      - name: Build summary
        run: |
          echo "✅ Build complete!"
          echo "📦 Download 'PushAlarm-IPA' from the Actions tab → this workflow run → Artifacts"
          echo "📱 Install on iPhone using Sideloadly (Windows) — sideloadly.io"
