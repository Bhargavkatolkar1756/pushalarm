name: Build PushAlarm IPA

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger it manually from the GitHub website

jobs:
  build:
    runs-on: macos-latest   # macOS runner with latest Xcode

    steps:
      # ── 1. Check out your code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode ─────────────────────────────────────────────────
      - name: Select Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.0.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.1.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.2.app 2>/dev/null || \
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      # ── 3. Build archive (unsigned) ─────────────────────────────────────
      - name: Build Archive (unsigned)
        run: |
          xcodebuild archive \
            -project PushAlarm.xcodeproj \
            -scheme PushAlarm \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/PushAlarm.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM=""

      # ── 4. Package .app → .ipa ──────────────────────────────────────────
      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/PushAlarm.xcarchive/Products" -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found in archive!"
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -r "$APP_PATH" "$PAYLOAD_DIR/"

          cd "$RUNNER_TEMP"
          zip -qr PushAlarm.ipa Payload
          echo "IPA created successfully at: $RUNNER_TEMP/PushAlarm.ipa"
          ls -lh PushAlarm.ipa

      # ── 5. Upload IPA as a downloadable artifact ─────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PushAlarm-IPA
          path: ${{ runner.temp }}/PushAlarm.ipa
          retention-days: 30

      # ── 6. Show build summary ───────────────────────────────────────────
      - name: Build summary
        run: |
          echo "✅ Build complete!"
          echo "📦 Download 'PushAlarm-IPA' from Actions → Artifacts"
          echo "📱 Install on iPhone using Sideloadly (Windows) — sideloadly.io"
