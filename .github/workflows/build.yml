name: Build PushAlarm IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build App (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project PushAlarm.xcodeproj \
            -target PushAlarm \
            -sdk iphoneos \
            -configuration Release \
            SYMROOT="$RUNNER_TEMP/Products" \
            OBJROOT="$RUNNER_TEMP/Intermediates" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tee xcodebuild.log || (echo "=== XCODEBUILD ERROR LOG ===" && tail -n 100 xcodebuild.log && exit 1)

      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/Products" -name "PushAlarm.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: PushAlarm.app not found in Products!"
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -r "$APP_PATH" "$PAYLOAD_DIR/"

          cd "$RUNNER_TEMP"
          zip -qr PushAlarm.ipa Payload
          echo "IPA created successfully at: $RUNNER_TEMP/PushAlarm.ipa"
          ls -lh PushAlarm.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PushAlarm-IPA
          path: ${{ runner.temp }}/PushAlarm.ipa
          retention-days: 30

      - name: Build summary
        run: |
          echo "✅ Build complete!"
          echo "📦 Download 'PushAlarm-IPA' from Actions → Artifacts"
          echo "📱 Install on iPhone using Sideloadly (Windows) — sideloadly.io"
